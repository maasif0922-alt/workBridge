<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offer a Service | WorkBridge</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .form-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--surface-color);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body style="background-color: var(--bg-color);">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-bridge-water"></i>
                Work<span>Bridge</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="services.html">Services</a>
                <a href="profiles.html">Freelancers</a>
                <a href="donations.html">Donation</a>
                <a href="user-profile.html">My Profile</a>
                <a href="dashboard.html">Login</a>
            </div>
            <button class="menu-toggle"><i class="fa-solid fa-bars"></i></button>
        </div>
    </nav>

    <!-- Page Content -->
    <section class="section">
        <div class="container">
            <button onclick="history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back</button>
            <div class="form-container">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <h1 class="section-title" style="font-size: 2rem;">Offer Your Service</h1>
                    <p class="section-subtitle">Reach thousands of clients by listing your skills.</p>
                </div>

                <form action="#" id="postServiceForm">
                    <div class="form-group">
                        <label class="form-label" for="serviceTitle">Service Title</label>
                        <input type="text" id="serviceTitle" class="form-control"
                            placeholder="e.g. Professional Logo Design" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="category">Category</label>
                            <select id="category" class="form-control" required>
                                <option value="" disabled selected>Select category</option>
                                <option value="digital">Digital & Tech</option>
                                <option value="home">Home & Repair</option>
                                <option value="writing">Writing & Admin</option>
                                <option value="creative">Creative Arts</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="experience">Experience Level</label>
                            <select id="experience" class="form-control" required>
                                <option value="beginner">Beginner</option>
                                <option value="intermediate">Intermediate</option>
                                <option value="expert">Expert / Pro</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="price">Starting Price (Rs)</label>
                            <input type="number" id="price" class="form-control" placeholder="e.g. 1500" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="delivery">Delivery Time</label>
                            <input type="text" id="delivery" class="form-control" placeholder="e.g. 3 Days">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="description">Service Description</label>
                        <textarea id="description" class="form-control" style="min-height: 120px;"
                            placeholder="Describe what you offer, your portfolio links (if any), and why clients should hire you..."
                            required></textarea>
                    </div>

                    <div style="margin-top: 2rem;">
                        <button type="submit" class="btn btn-primary"
                            style="width: 100%; font-size: 1.125rem; padding: 1rem;"><i
                                class="fa-solid fa-paper-plane"></i> Publish My Service</button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-bottom" style="margin-top: 0;">
                &copy; 2026 WorkBridge (KaamLink). All rights reserved.
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('postServiceForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Publishing...';

            setTimeout(() => {
                btn.innerHTML = '<i class="fa-solid fa-circle-check"></i> Service Published Successfully!';
                btn.style.backgroundColor = 'var(--secondary-color)';
                setTimeout(() => {
                    this.reset();
                    btn.innerHTML = originalText;
                    btn.style.backgroundColor = 'var(--primary-color)';
                }, 3000);
            }, 1500);
        });
    </script>
</body>

</html>
